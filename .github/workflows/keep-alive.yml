name: Keep Service Alive

on:
  schedule:
    # 每 10 分钟执行一次（避免 Render 15 分钟休眠）
    - cron: '*/10 * * * *'
  workflow_dispatch:

jobs:
  keep-alive:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Service
        run: |
          echo "Pinging at $(date)"
          curl -f --max-time 30 https://ai-photo-automation.onrender.com/api/health || echo "Service waking up..."
          echo "Done"

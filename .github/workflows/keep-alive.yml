name: Keep Service Alive

on:
  schedule:
    # 每 10 分钟执行一次（避免 Render 休眠）
    - cron: '*/10 * * * *'
  workflow_dispatch:  # 允许手动触发

jobs:
  keep-alive:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Service Health Check
        run: |
          echo "Pinging service to keep it alive..."
          curl -f https://ai-photo-automation.onrender.com/api/health || echo "Service is starting up..."
          echo "Ping completed at $(date)"
